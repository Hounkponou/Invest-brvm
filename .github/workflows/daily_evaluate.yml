name: Évaluation Quotidienne

on:
  schedule:
    - cron: '30 18 * * 1-5'
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./brvm-prediction
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Exécuter l'évaluation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python main.py --task evaluate