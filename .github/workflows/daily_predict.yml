name: Inférence Quotidienne (Prédictions)

on:
  schedule:
    - cron: '0 18 * * 1-5' # À 18:00, du Lundi au Vendredi
  workflow_dispatch: # Permet de lancer manuellement depuis l'interface GitHub

jobs:
  predict:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./brvm-prediction
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Exécuter les prédictions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python main.py --task predict