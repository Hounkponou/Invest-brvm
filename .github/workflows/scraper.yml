name: BRVM Scraper Bot

on:
  schedule:
    # S'exécute toutes les 15 minutes, entre 08:00 et 20:00, du Lundi au Vendredi (Heure GMT)
    - cron: '*/15 8-20 * * 1-5'
  workflow_dispatch: # Permet aussi de lancer le script manuellement en un clic sur GitHub

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🐍 Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Exécution du processus ETL
        env:
          # GitHub injecte ici les secrets que tu as configurés à l'Étape 2
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python main.py